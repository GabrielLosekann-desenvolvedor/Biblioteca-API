openapi: 3.0.3
info:
  title: Biblioteca API
  description: API REST para gerenciamento de livros, usuários e empréstimos.
  version: 1.0.0

servers:
  - url: http://localhost:3000/api
    description: Servidor local de desenvolvimento

tags:
  - name: Books
  - name: Users
  - name: Loans

security:
  - bearerAuth: []

paths:

  /books:
    get:
      tags: [Books]
      summary: Lista todos os livros
      description: Retorna uma lista paginada de livros cadastrados no sistema.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            example: 1
        - name: limit
          in: query
          schema:
            type: integer
            example: 10
      responses:
        '200':
          description: Lista de livros retornada com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags: [Books]
      summary: Adiciona um novo livro
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookInput'
      responses:
        '201':
          description: Livro criado com sucesso
        '400':
          $ref: '#/components/responses/BadRequest'

  /books/{id}:
    get:
      tags: [Books]
      summary: Retorna um livro específico
      description: Busca um livro pelo seu identificador único.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Livro encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Books]
      summary: Atualiza informações de um livro
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookInput'
      responses:
        '200':
          description: Livro atualizado com sucesso
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Books]
      summary: Remove um livro
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Livro removido com sucesso
        '404':
          $ref: '#/components/responses/NotFound'

  /users:
    get:
      tags: [Users]
      summary: Lista todos os usuários
      description: Retorna todos os usuários cadastrados.
      responses:
        '200':
          description: Lista de usuários retornada com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

    post:
      tags: [Users]
      summary: Cria um novo usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInput'
      responses:
        '201':
          description: Usuário criado com sucesso
        '400':
          $ref: '#/components/responses/BadRequest'

  /users/{id}:
    get:
      tags: [Users]
      summary: Retorna dados de um usuário específico
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Usuário encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'

  /loans:
    get:
      tags: [Loans]
      summary: Lista todos os empréstimos
      description: Retorna todos os empréstimos ativos.
      responses:
        '200':
          description: Lista de empréstimos retornada com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Loan'

    post:
      tags: [Loans]
      summary: Registra um novo empréstimo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoanInput'
      responses:
        '201':
          description: Empréstimo registrado com sucesso
        '400':
          $ref: '#/components/responses/BadRequest'

  /loans/{id}/return:
    put:
      tags: [Loans]
      summary: Marca um empréstimo como devolvido
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Empréstimo devolvido com sucesso
        '404':
          $ref: '#/components/responses/NotFound'

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  responses:
    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            status: error
            message: Recurso não encontrado

    BadRequest:
      description: Dados inválidos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            status: error
            message: Dados inválidos

    InternalError:
      description: Erro interno do servidor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            status: error
            message: Erro interno do servidor

  schemas:

    Error:
      type: object
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: Recurso não encontrado

    Book:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Dom Casmurro
        author:
          type: string
          example: Machado de Assis
        available:
          type: boolean
          example: true

    BookInput:
      type: object
      required: [title, author]
      properties:
        title:
          type: string
        author:
          type: string

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string

    UserInput:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
        email:
          type: string

    Loan:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        bookId:
          type: integer
        dueDate:
          type: string
          format: date
        returned:
          type: boolean

    LoanInput:
      type: object
      required: [userId, bookId, dueDate]
      properties:
        userId:
          type: integer
        bookId:
          type: integer
        dueDate:
          type: string
          format: date


